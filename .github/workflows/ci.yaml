name: CI

on: push

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache Nuxt build
        uses: actions/cache@v5
        with:
          path: .nuxt
          key: ${{ runner.os }}-nuxt-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-nuxt-

      - name: Install dependencies
        run: bun ci

      - name: Format files
        run: bun run fmt

      - name: Lint files
        run: bun run lint

      - name: Run typecheck
        run: bun run nuxt:typecheck

      - name: Build Nuxt application
        run: bun run nuxt:build
